services:
  - type: web
    name: michael-jackson-top-15
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 3000
      - key: DB_PATH
        value: /data/app.db
    disk:
      name: mj-top15-data
      mountPath: /data
      sizeGB: 1
